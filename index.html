<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Forest Spirit </title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

</head>
<body>
    <div class="forest-header">
        <i class="ph ph-moon" id="moon-icon"></i>
    <h1>The Ancient Forest</h1>
    <div class="forest-stars">
        <i class="ph ph-star star-icon1" ></i>
        <i class="ph ph-star star-icon2" ></i>       
        <i class="ph ph-star star-icon3" ></i>
        <i class="ph ph-star star-icon4" ></i>
        <i class="ph ph-star star-icon5" ></i>
        <i class="ph ph-star star-icon6" ></i>
        <i class="ph ph-star star-icon7" ></i>
    </div>
    </div>

    <div class="forest-content">
        <i class="ph ph-tree" id="tree-icon"></i>
        <p class="forest-par">"The trees have watched the world longer than we have."</p>
        <button onclick="generateWhisper()">Hear a Whisper</button>
        <p id="whisper-output"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
